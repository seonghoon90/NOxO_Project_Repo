[pytest]
testpaths = tests
# digital_twin 패키지를 import 가능하게 함 (`from digital_twin.simulation import ...`).
# Docker 환경은 Dockerfile의 PYTHONPATH로 처리되고, 로컬 pytest 실행 시 본 설정이 적용된다.
pythonpath = . ../..
filterwarnings =
    ignore::DeprecationWarning
# === ML simulator TDD용 신규 옵션 ===
asyncio_mode = auto
markers =
    integration: requires real models/DB
