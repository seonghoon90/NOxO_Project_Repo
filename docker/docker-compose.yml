services:
  postgres:
    # DB 정의서 v1.0 §2.2 기준 PostgreSQL 15
    image: postgres:15-alpine
    profiles: ["local-db"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-igcc_db}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
      # 초기화 스크립트는 향후 추가 — [DB 협의 필요]
      # - ../database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [noxo-net]

  backend:
    build:
      context: ..
      dockerfile: apps/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@host.docker.internal:5432/${POSTGRES_DB:-igcc_db}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      KAFKA_STREAM_ENABLED: ${KAFKA_STREAM_ENABLED:-false}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      KAFKA_SENSOR_TOPIC: ${KAFKA_SENSOR_TOPIC:-noxo.sensor.raw}
      KAFKA_CONSUMER_GROUP_ID: ${KAFKA_CONSUMER_GROUP_ID:-noxo-backend-stream}
      TZ: Asia/Seoul
    volumes:
      - ../data:/app/data:ro
      - dt_models:/app/digital_twin/models
    networks: [noxo-net]

  frontend:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    depends_on: [backend]
    networks: [noxo-net]

volumes:
  pgdata:
  dt_models:

networks:
  noxo-net:
    driver: bridge
