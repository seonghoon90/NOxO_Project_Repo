# Experiment 1: LightGBM (Initial Exploration)
# 기본 설정으로 LightGBM 성능 확인

model:
  type: lightgbm
  name: LightGBM v1
  description: LightGBM with standard hyperparameters

parameters:
  # Learning
  learning_rate: 0.05
  n_estimators: 500

  # Tree structure
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20

  # Regularization
  subsample: 0.8
  colsample_bytree: 0.8
  lambda_l1: 0.0
  lambda_l2: 0.1

  # Other
  random_state: 42
  n_jobs: -1
  verbose: -1

training:
  early_stopping_rounds: 50
  validation_split: 0.2
  metric: mae

data:
  features: all_88_features
  target: IGCC.DeNOX.AT_H1_901_PV
  exclude_features: []  # Tip: O₂누수 확인용으로 포함

feature_engineering:
  interactions: []  # v1은 기본 피처만 사용
  lags: []

evaluation:
  metrics: [mae, rmse, mape, r2]
  cv_folds: 5

artifacts:
  model_save_path: experiments/models/exp_003_lightgbm_v1.pkl
  log_save_path: experiments/logs/exp_003_lightgbm_v1.log
  feature_importance_plot: reports/figures/exp_003_importance.png

notes: |
  Initial LightGBM experiment with standard hyperparameters.
  Goal: Compare with Ridge (0.0950) and XGBoost (0.0891) baselines.
  O₂ 포함 모델로 데이터 누수 영향 정량화 예정.
